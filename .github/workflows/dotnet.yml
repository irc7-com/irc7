name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # clang is required by the native AOT trim analyser at build time
    - name: Install native AOT build prerequisites
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends clang zlib1g-dev

    - name: Add GitHub Packages NuGet source
      run: |
        dotnet nuget add source "https://nuget.pkg.github.com/mono-chat/index.json" \
          --name "mono-chat" \
          --username jyonxo \
          --password "${{ secrets.IRCX_SSPI_TOKEN }}" \
          --store-password-in-clear-text

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal

  image:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # QEMU lets buildx compile/emulate arm64 on the x64 runner
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    # Build the native AOT image and push both amd64 and arm64 variants.
    # The Dockerfile installs clang inside the build stage, so no extra
    # host tooling is needed here beyond Docker itself.
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          jyonxo/irc7d:latest
          jyonxo/irc7d:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

